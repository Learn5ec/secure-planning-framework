name: SPF Schema Linter

on:
  push:
    paths:
      - 'core/output_schema.json'
      - 'core/output_example.json'
  pull_request:
    paths:
      - 'core/output_schema.json'
      - 'core/output_example.json'

jobs:
  validate-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AJV CLI
        run: npm install -g ajv-cli ajv-formats

      - name: Validate output_schema.json (Draft 2020-12)
        run: ajv compile -s core/output_schema.json --spec=draft2020

      - name: Validate output_example.json against schema
        run: ajv validate -s core/output_schema.json -d core/output_example.json --spec=draft2020

      - name: Run Rule Index Integrity Check
        run: python3 scripts/check_index_orphans.py
